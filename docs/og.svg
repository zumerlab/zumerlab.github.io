<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1f1f22" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#041a18"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>

  <!-- crosshair markers -->
  <g stroke="#3afff0" stroke-width="1.5">
    <line x1="40" y1="50" x2="60" y2="50"/><line x1="50" y1="40" x2="50" y2="60"/>
    <line x1="1140" y1="50" x2="1160" y2="50"/><line x1="1150" y1="40" x2="1150" y2="60"/>
    <line x1="40" y1="580" x2="60" y2="580"/><line x1="50" y1="570" x2="50" y2="590"/>
    <line x1="1140" y1="580" x2="1160" y2="580"/><line x1="1150" y1="570" x2="1150" y2="590"/>
  </g>

  <!-- top brand -->
  <text x="80" y="100" font-family="ui-monospace, Menlo, monospace" font-size="20" fill="#ebe8e0" letter-spacing="4">ZUMERLAB</text>
  <line x1="80" y1="120" x2="1120" y2="120" stroke="#1f1f22" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- main headline -->
  <g font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-weight="400">
    <text x="80" y="280" font-size="92" fill="#ebe8e0">A small lab building</text>
    <text x="80" y="380" font-size="92" fill="#3afff0">unusual <tspan fill="#3a3a3c">/</tspan></text>
    <text x="80" y="480" font-size="92" fill="#ebe8e0">web tools.</text>
  </g>

  <!-- orbit ring graphic -->
  <g transform="translate(980, 320)">
    <circle r="140" fill="none" stroke="#1f1f22" stroke-width="1"/>
    <circle r="100" fill="none" stroke="#3afff0" stroke-width="1" stroke-dasharray="3 5"/>
    <circle r="60" fill="none" stroke="#1f1f22" stroke-width="1"/>
    <circle r="20" fill="none" stroke="#3afff0" stroke-width="1.5"/>
    <circle r="3" fill="#3afff0"/>
    <circle cx="0" cy="-140" r="4" fill="#3afff0"/>
  </g>

  <!-- footer line -->
  <line x1="80" y1="540" x2="1120" y2="540" stroke="#1f1f22" stroke-width="1" stroke-dasharray="4 4"/>
  <g font-family="ui-monospace, Menlo, monospace" font-size="16" fill="#8a8780" letter-spacing="2">
    <text x="80" y="575">ORBIT  /  ZUMLY  /  SNAPDOM</text>
    <text x="1120" y="575" text-anchor="end">ZUMERLAB.COM</text>
  </g>
</svg>
